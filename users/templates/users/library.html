{% extends "base.html" %}

{% block content %}

<h1>My Library</h1>

<ul>
  {% for entry in library %}

  <li>
    {{ entry.book.title }} - {{ entry.get_status_display }}

    <a href="{% url 'users:update_library_entry' entry.pk %}"> Update </a>
    <a href="{% url 'users:delete_library_entry' entry.pk %}"> Remove </a>
  </li>

  {% empty %}

  <li>Your library is empty.</li>

  {% endfor %}
</ul>

{% endblock %}
